<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage Bersih</title>
    <style>
        /* Gaya dasar untuk mereset dan merapikan tampilan */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        
        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }

        /* Layout dua kolom: Konten Utama & Sidebar */
        .container {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            gap: 30px;
        }

        .main-content {
            flex: 3;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .sidebar {
            flex: 1;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            height: fit-content;
        }

        /* Styling Sidebar & Kategori */
        .sidebar h3 {
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .kategori-text {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .kategori-text li {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            color: #666; /* Warna abu-abu untuk menandakan ini hanya teks, bukan link */
        }

        .kategori-text li:last-child {
            border-bottom: none;
        }

        /* Placeholder untuk artikel baru */
        .tempat-artikel-baru {
            border: 2px dashed #ccc;
            padding: 50px;
            text-align: center;
            border-radius: 8px;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>Website Baru</h1>
    </header>

    <div class="container">
        <!-- Area untuk Artikel Terbaru di Homepage -->
        <main class="main-content">
            <h2>Artikel Terbaru</h2>
            
            <div class="tempat-artikel-baru">
                <p>Homepage sudah bersih. Siap untuk menerima artikel terbarumu di sini.</p>
            </div>
        </main>

        <!-- Area Sidebar -->
        <aside class="sidebar">
            <h3>Kategori</h3>
            <!-- Hanya teks, belum ada isi atau link -->
            <ul class="kategori-text">
                <li>Kategori 1</li>
                <li>Kategori 2</li>
                <li>Kategori 3</li>
                <li>Kategori 4</li>
            </ul>
        </aside>
    </div>

</body>
</html>
